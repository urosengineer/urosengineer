name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # Runs daily in the early morning for Europe/Belgrade.
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A profile-3d-contrib

          if git diff --cached --quiet; then
            echo "No 3D contribution profile changes to commit."
          else
            git commit -m "Generate 3D contribution profile"
            git push
          fi
