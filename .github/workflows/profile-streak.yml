name: Profile Streak

on:
  push:
    paths:
      - ".github/workflows/profile-streak.yml"
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare streak output directory
        run: mkdir -p profile

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&hide_border=true&background=0D1117&stroke=1F6FEB&ring=58A6FF&fire=FF7B72&currStreakNum=FFFFFF&sideNums=FFFFFF&currStreakLabel=C9D1D9&sideLabels=C9D1D9&dates=8B949E&disable_animations=true&card_width=700
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push streak
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile/streak.svg

          if git diff --cached --quiet; then
            echo "No streak changes to commit."
          else
            git commit -m "Generate profile streak"
            git push
          fi
